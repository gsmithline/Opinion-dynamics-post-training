      - wandb>=0.17
      - weave>=0.50
      - numpy<2
      - pandas>=2.0
      - scikit-learn>=1.3
      - scipy>=1.11
      - networkx>=3.2
      - matplotlib>=3.8
      - sentence-transformers>=3.0
      - sentencepiece>=0.2
      - protobuf>=4.25
